<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Lumen Bank</title>

    <link rel="stylesheet" href="css/styles.css">

<body>

<div class="app">

    <header>

            LUMEN
        </div>

        <p id="greeting">

    <main>

        <section class="card">

            <p class="small">
                Available Balance
            </p>

            <h1 id="balance">

        </section>


        <section>
            <h2>
                Accounts
            </h2>


            <div class="account">

                <div>
                    Checking
                </div>

                <strong>
                    $28,473.91

            </div>


            <div class="account">

                <div>
                    Savings
                </div>

                <strong>
                    $8,200.00
                </strong>

            </div>


        </section>


    </main>



    <nav>

        <button>
            Home
        </button>

        <button>
            Cards
        </button>

        <button>
            Settings
        </button>

    </nav>

<script src="js/storage.js"></script>
